name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    name: Android debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build mobile app
        run: npm run build -w @codep/mobile

      - name: Sync Capacitor Android project
        run: npm run cap:sync -w @codep/mobile

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Name APK
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk "release/codex-plus_${VERSION}_android_debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codex-plus-android-debug
          path: release/*_android_debug.apk
          if-no-files-found: error

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*_android_debug.apk
